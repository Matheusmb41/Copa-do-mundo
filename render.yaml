services:
  - type: web
    name: premonicao-copa
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WORLD_CUP_SEASON
        value: "2026"
      - key: API_CACHE_MS
        value: "120000"
      - key: SIMULATION_CACHE_MS
        value: "120000"
      - key: SIMULATION_RUNS
        value: "30000"
